name: Test
on:
  pull_request:
  push: { branches: master }

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Run shellcheck tests
      run: shellcheck alf setup
    - name: Run Bats tests
      run: bats --recursive --print-output-on-failure --abort test

  ubuntu_setup:
    name: Setup on Ubuntu
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Run setup
      run:
        ./setup
        command -v alf
    - name: Run uninstall
      run:
        ./uninstall
        ! command -v alf

  macos_setup:
    name: Setup on macOS
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Upgrade the outdated bash
      run: brew install bash
    - name: Run setup
      run:
        ./setup
        command -v alf
    - name: Run uninstall
      run:
        ./uninstall
        ! command -v alf

  static_analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    # Rush needed for easy installation of latest shfmt
    - name: Install rush
      run: curl -Ls http://get.dannyb.co/rush/setup | bash
    - name: Connect rush repo
      run: rush clone dannyben --shallow --default
    - name: Install shfmt and opcode
      run: rush get shfmt && rush get opcode
    - name: Run shellcheck tests
      run: op shellcheck
    - name: Run shfmt tests
      run: op shfmt
